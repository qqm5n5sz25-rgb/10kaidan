<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>怪談生成器</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0705;--cp:#ffad5a;--ca:#ff6b1a;--blood:#8b0000;--ink:#c8b89a;--dim:#7a6a55;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'Shippori Mincho','Hiragino Mincho ProN',serif;overflow-x:hidden;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* 入力画面 */
#screen-input{background:var(--bg);align-items:stretch;}
.s-header{text-align:center;padding:52px 20px 28px;}
.s-title{font-size:clamp(1.7rem,8vw,2.8rem);font-weight:700;letter-spacing:.3em;color:var(--cp);text-shadow:0 0 40px rgba(255,107,26,.6),0 0 80px rgba(255,69,0,.3);animation:titleFlicker 8s infinite;}
.s-sub{font-size:.75rem;letter-spacing:.5em;color:var(--dim);margin-top:6px;}
.input-card{margin:0 16px 40px;background:linear-gradient(135deg,#1a1108,#130e08);border:1px solid rgba(200,184,154,.12);border-radius:8px;padding:24px;box-shadow:0 8px 60px rgba(0,0,0,.7);}
.field-label{font-size:.68rem;letter-spacing:.4em;color:var(--ca);display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.field-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,107,26,.3),transparent);}
.f-input{width:100%;padding:13px 14px;background:rgba(0,0,0,.5);color:var(--ink);border:1px solid rgba(200,184,154,.15);border-radius:6px;font-family:inherit;font-size:.9rem;outline:none;-webkit-appearance:none;transition:border-color .25s;}
.f-input:focus{border-color:rgba(255,107,26,.5);}
#apikey{font-family:monospace;font-size:.78rem;}
input::placeholder{color:rgba(122,106,85,.6);}
.hint{font-size:.66rem;color:var(--dim);margin-top:6px;letter-spacing:.04em;line-height:1.6;}
.divider{height:1px;background:rgba(200,184,154,.08);margin:20px 0;}
.gen-btn{width:100%;margin-top:20px;padding:17px;background:linear-gradient(135deg,#5a0000,#8b0000 50%,#5a0000);border:1px solid rgba(200,100,50,.4);border-radius:6px;color:var(--cp);font-family:inherit;font-size:1rem;font-weight:700;letter-spacing:.5em;text-shadow:0 0 20px rgba(255,107,26,.8);cursor:pointer;-webkit-appearance:none;transition:opacity .2s;}
.gen-btn:active{opacity:.7;}
.gen-btn:disabled{opacity:.4;cursor:not-allowed;}
#err-box{display:none;margin-top:14px;padding:12px 14px;background:rgba(139,0,0,.3);border:1px solid rgba(200,50,50,.4);border-radius:6px;font-size:.75rem;color:#ff9999;line-height:1.7;}

/* ローディング */
#screen-loading{background:rgba(5,3,2,.98);align-items:center;justify-content:center;padding:40px 20px;}
.loading-title{font-size:.95rem;letter-spacing:.6em;color:var(--cp);margin-bottom:8px;text-align:center;}
.loading-phase{font-size:.73rem;letter-spacing:.2em;color:var(--dim);margin-bottom:28px;min-height:1.5em;text-align:center;line-height:1.7;}
.prog-wrap{width:min(260px,80vw);margin-bottom:8px;}
.prog-track{height:3px;background:rgba(200,184,154,.1);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#8b0000,#ff6b1a);border-radius:2px;transition:width .6s ease;}
.prog-pct{text-align:right;font-size:.7rem;color:var(--ca);margin-top:5px;}
.step-list{display:flex;flex-direction:column;gap:8px;width:min(260px,80vw);margin-top:14px;}
.step-item{display:flex;align-items:center;gap:10px;font-size:.7rem;letter-spacing:.12em;transition:all .4s;}
.step-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:all .4s;}

/* 怪談表示 */
#screen-story{background:var(--bg);}
.story-card{margin:0 16px 40px;background:linear-gradient(135deg,#140e08,#0f0a06);border:1px solid rgba(200,184,154,.1);border-radius:8px;padding:28px 24px;position:relative;overflow:hidden;}
.story-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,transparent,#8b0000,transparent);}
.story-title{font-size:1.15rem;font-weight:700;color:var(--cp);letter-spacing:.25em;margin-bottom:8px;}
.story-meta{font-size:.65rem;color:var(--dim);letter-spacing:.15em;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid rgba(200,184,154,.08);}
.story-body{font-size:.9rem;line-height:2.1;letter-spacing:.07em;color:var(--ink);white-space:pre-wrap;}
.action-row{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap;}
.play-btn{flex:1;min-width:120px;padding:13px 10px;background:linear-gradient(135deg,#3a0000,#6b0000);border:1px solid rgba(200,100,50,.4);border-radius:6px;color:var(--cp);font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.3em;cursor:pointer;-webkit-appearance:none;transition:opacity .2s;}
.play-btn:active{opacity:.7;}
.sub-btn{padding:13px 14px;background:none;border:1px solid rgba(200,184,154,.2);border-radius:6px;color:var(--dim);font-family:inherit;font-size:.75rem;letter-spacing:.25em;cursor:pointer;-webkit-appearance:none;transition:opacity .2s;}
.sub-btn:active{opacity:.6;}

/* プレイヤー */
#screen-player{background:#050302;min-height:100vh;display:none;flex-direction:column;}
#screen-player.active{display:flex;}
.player-header{padding:max(48px,env(safe-area-inset-top)) 20px 16px;text-align:center;background:rgba(0,0,0,.7);border-bottom:1px solid rgba(200,184,154,.07);flex-shrink:0;}
.player-header-title{font-size:.78rem;color:var(--cp);letter-spacing:.3em;text-shadow:0 0 20px rgba(255,107,26,.4);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.subtitle-area{flex:1;display:flex;align-items:center;justify-content:center;padding:28px 32px;background:radial-gradient(ellipse at center,rgba(28,8,4,.95),rgba(5,3,2,1));}
.subtitle-text{font-size:clamp(1.05rem,5vw,1.45rem);color:#f2e2c4;text-align:center;line-height:2.1;letter-spacing:.13em;text-shadow:0 0 48px rgba(255,200,100,.25),0 2px 10px rgba(0,0,0,.9);max-width:580px;transition:opacity .2s ease;}
.subtitle-text.fade{opacity:0;}
.seq-wrap{padding:0 24px 14px;background:rgba(5,3,2,.97);flex-shrink:0;}
.seq-info{display:flex;justify-content:space-between;font-size:.63rem;color:var(--dim);letter-spacing:.1em;padding-top:12px;margin-bottom:10px;}
.seq-track{width:100%;height:24px;display:flex;align-items:center;position:relative;}
.seq-rail{position:absolute;left:0;right:0;height:4px;background:rgba(200,184,154,.12);border-radius:2px;}
.seq-fill{position:absolute;left:0;height:4px;width:0%;background:linear-gradient(90deg,var(--blood),var(--ca));border-radius:2px;}
.seq-handle{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--cp);box-shadow:0 0 10px var(--ca);transform:translateX(-50%);top:50%;margin-top:-7px;pointer-events:none;left:0%;}
.ctrl-bar{background:rgba(4,2,1,.99);padding:16px 24px;padding-bottom:max(22px,env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-between;gap:14px;border-top:1px solid rgba(200,184,154,.06);flex-shrink:0;}
.ctrl-side{display:flex;align-items:center;gap:12px;}
.cb{background:none;font-family:inherit;cursor:pointer;-webkit-appearance:none;border:none;display:flex;align-items:center;justify-content:center;transition:opacity .15s;touch-action:manipulation;}
.cb:active{opacity:.45;}
.btn-play{width:62px;height:62px;border-radius:50%;background:linear-gradient(145deg,#5a0000,#8b0000);border:2px solid rgba(200,100,50,.55);color:var(--cp);font-size:1.5rem;box-shadow:0 0 24px rgba(139,0,0,.55);}
.btn-end{font-size:.65rem;letter-spacing:.25em;color:rgba(200,100,100,.75);border:1px solid rgba(139,0,0,.4);border-radius:4px;padding:9px 14px;}

@keyframes titleFlicker{0%,100%{opacity:1;}92%{opacity:1;}93%{opacity:.5;}94%{opacity:1;}97%{opacity:.75;}98%{opacity:1;}}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:rgba(200,184,154,.15);border-radius:2px;}
</style>
</head>
<body>

<!-- 入力画面 -->
<div id="screen-input" class="screen active">
  <div class="s-header">
    <div class="s-title">怪　談　生　成　器</div>
    <div class="s-sub">─ 闇 の 語 り 部 ─</div>
  </div>
  <div class="input-card">
    <div class="field-label">Anthropic APIキー</div>
    <input type="password" id="apikey" class="f-input" placeholder="sk-ant-api03-..." autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="hint">取得：console.anthropic.com → API Keys</div>
    <div class="divider"></div>
    <div class="field-label">OpenAI APIキー <span style="font-size:.6rem;color:var(--dim);letter-spacing:.1em;">（任意・自然な音声になります）</span></div>
    <input type="password" id="openai-key" class="f-input" placeholder="sk-..." autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="hint">未入力の場合はデバイス標準の音声を使用します。取得：platform.openai.com → API Keys</div>
    <div class="divider"></div>
    <div class="field-label">呪いのキーワード</div>
    <input type="text" id="keyword" class="f-input" placeholder="例：古井戸、赤い着物、子守唄" autocorrect="off">
    <div class="hint">怪談の題材となるキーワードを入力してください</div>
    <button class="gen-btn" id="gen-btn" onclick="startGenerate()">▲ 怪談を紡ぐ ▲</button>
    <div id="err-box"></div>
  </div>
</div>

<!-- ローディング画面 -->
<div id="screen-loading" class="screen">
  <p class="loading-title">怪 談 を 紡 い で い る</p>
  <p class="loading-phase" id="loading-phase">AIが闇の中から物語を呼び起こしています…</p>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    <div class="prog-pct" id="prog-pct">0%</div>
  </div>
  <div class="step-list" id="step-list"></div>
</div>

<!-- 怪談表示画面 -->
<div id="screen-story" class="screen">
  <div class="s-header">
    <div class="s-title" style="font-size:clamp(1.4rem,7vw,2.4rem)">怪　談　生　成　器</div>
    <div class="s-sub">─ 闇 の 語 り 部 ─</div>
  </div>
  <div class="story-card">
    <div class="story-title" id="story-title"></div>
    <div class="story-meta"  id="story-meta"></div>
    <div class="story-body"  id="story-body"></div>
    <div class="action-row">
      <button class="play-btn" onclick="startPlayer()">▶ 読み上げ</button>
      <button class="sub-btn"  onclick="copyStory()">コピー</button>
      <button class="sub-btn"  onclick="showScreen(\'screen-input\')">再生成</button>
    </div>
  </div>
</div>

<!-- プレイヤー画面 -->
<div id="screen-player" class="screen">
  <div class="player-header">
    <div class="player-header-title" id="player-title">─</div>
  </div>
  <div class="subtitle-area">
    <div class="subtitle-text" id="subtitle-text">　</div>
  </div>
  <div class="seq-wrap">
    <div class="seq-info">
      <span id="seq-label">0%</span>
      <span id="time-label">0:00 / 0:00</span>
    </div>
    <div class="seq-track" id="seq-track">
      <div class="seq-rail"></div>
      <div class="seq-fill"   id="seq-fill"></div>
      <div class="seq-handle" id="seq-handle"></div>
    </div>
  </div>
  <div class="ctrl-bar">
    <div class="ctrl-side"></div>
    <button class="cb btn-play" id="btn-play" onclick="togglePause()">▶</button>
    <div class="ctrl-side">
      <button class="cb btn-end" onclick="stopPlayer()">終了</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ══ ローディング ══ */
const STEPS = [
  {pct:12,label:'キーワードを解析中',    phase:'AIがキーワードの怪異を読み解いています…'},
  {pct:30,label:'怪異の舞台を設定中',    phase:'古の地に舞台を設けています…'},
  {pct:55,label:'登場人物を召喚中',      phase:'幽世から人物を呼び出しています…'},
  {pct:78,label:'恐怖の物語を紡ぐ中',   phase:'暗闇から言葉を紡いでいます…'},
  {pct:92,label:'読み仮名を付けています',phase:'怪しの言葉に魂を吹き込んでいます…'},
];
let progTimer=null;
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function buildStepList(){const l=document.getElementById('step-list');l.innerHTML='';STEPS.forEach((s,i)=>{const d=document.createElement('div');d.className='step-item';d.id='step-'+i;d.style.cssText='opacity:.3;color:#7a6a55;';d.innerHTML=`<div class="step-dot" id="dot-${i}" style="background:rgba(200,184,154,.2)"></div>${s.label}`;l.appendChild(d);});}
function startProgress(){updateBar(0);buildStepList();document.getElementById('loading-phase').textContent='AIが闇の中から物語を呼び起こしています…';let e=0;clearInterval(progTimer);progTimer=setInterval(()=>{e+=0.3;const p=Math.round(92*(1-Math.pow(1-Math.min(1,e/28),1.6)));updateBar(p);let ns=-1;for(let i=STEPS.length-1;i>=0;i--){if(p>=STEPS[i].pct){ns=i;break;}}updateSteps(ns);},300);}
function updateBar(p){document.getElementById('prog-fill').style.width=p+'%';document.getElementById('prog-pct').textContent=p+'%';}
function updateSteps(a){STEPS.forEach((s,i)=>{const el=document.getElementById('step-'+i);const dot=document.getElementById('dot-'+i);if(!el)return;if(i<a){el.style.cssText='opacity:1;color:#c8b89a;';dot.style.cssText='background:#7de8a8;';}else if(i===a){el.style.cssText='opacity:1;color:#ffad5a;';dot.style.cssText='background:#ff6b1a;box-shadow:0 0 6px #ff6b1a;';document.getElementById('loading-phase').textContent=s.phase;}else{el.style.cssText='opacity:.3;color:#7a6a55;';dot.style.cssText='background:rgba(200,184,154,.2)';}});}
function stopProgress(){clearInterval(progTimer);updateBar(100);updateSteps(STEPS.length);document.getElementById('loading-phase').textContent='怪談の完成…';}

/* ══ パース処理 ══
   Claudeの出力形式：
   タイトル：〇〇〇〇
   よみ：〇〇〇〇（タイトルのひらがな）

   （本文 - 漢字あり - 表示用）

   よみがな：
   （本文 - 純ひらがな - 読み上げ用）
══ */
function parseStory(raw) {
  const lines = raw.split('\n');
  let titleDisplay = '名無しの怪談';
  let titleSpeech  = '';
  const displayLines = [];
  const speechLines  = [];
  let mode = 'display';

  for (const line of lines) {
    const s = line.trim();
    if (!s) {
      // 空行はそのまま区切りとして扱う（modeによる）
      if (mode === 'display' && displayLines.length > 0) displayLines.push('');
      else if (mode === 'speech') speechLines.push('');
      continue;
    }
    if (/^タイトル[：:]/.test(s)) {
      titleDisplay = s.replace(/^タイトル[：:]/, '').trim();
    } else if (/^よみ[：:]/.test(s) && mode === 'display') {
      titleSpeech = s.replace(/^よみ[：:]/, '').trim();
    } else if (/^よみがな[：:]/.test(s)) {
      mode = 'speech';
    } else if (mode === 'display') {
      displayLines.push(s);
    } else if (mode === 'speech') {
      speechLines.push(s);
    }
  }

  if (!titleSpeech) titleSpeech = titleDisplay;

  // 空行を除いた段落リストに整理
  const displayParas = displayLines.join('\n').split(/\n{2,}/).map(p => p.trim()).filter(Boolean);
  const speechParas  = speechLines.join('\n').split(/\n{2,}/).map(p => p.trim()).filter(Boolean);

  return { titleDisplay, titleSpeech, displayParas, speechParas };
}

/* ══ 怪談生成 ══ */
let savedTitleDisplay = '';
let savedDisplayParas = [];  // 表示用（漢字）
let savedSpeechParas  = [];  // 読み上げ用（ひらがな）
let savedDisplayFull  = '';  // 表示テキスト全体

// 字幕キュー：{ displayText, speechCharOffset }
// speechCharOffset は全読み上げテキスト内の文字位置
let subtitleCues  = [];
let speechFull    = '';
let speechTotalChars = 0;

function buildSubtitleCues(displayParas, speechParas) {
  const cues = [];
  let charOffset = 0;
  const count = Math.min(displayParas.length, speechParas.length);

  for (let i = 0; i < count; i++) {
    const dp = displayParas[i];
    const sp = speechParas[i];

    // 段落内を句点で文分割
    const dispSents = dp.split(/(?<=[。！？…]+)/).map(s => s.trim()).filter(Boolean);
    const spLen     = sp.length;

    if (dispSents.length === 0) {
      charOffset += spLen + 1; // +1 は段落区切りの '\n'
      continue;
    }

    // 各文の表示タイミングを文字数比で計算
    let sentOffset = 0;
    for (let j = 0; j < dispSents.length; j++) {
      const frac   = j === 0 ? 0 : sentOffset / dp.length;
      cues.push({
        displayText:     dispSents[j],
        speechCharOffset: charOffset + Math.floor(frac * spLen),
      });
      sentOffset += dispSents[j].length;
    }

    charOffset += spLen + 1; // 段落区切り分を加算
  }

  return cues;
}

async function startGenerate() {
  const apiKey  = document.getElementById('apikey').value.trim();
  const keyword = document.getElementById('keyword').value.trim();
  if (!apiKey)  { alert('APIキーを入力してください'); return; }
  if (!keyword) { alert('キーワードを入力してください'); return; }

  document.getElementById('err-box').style.display = 'none';
  document.getElementById('gen-btn').disabled = true;
  showScreen('screen-loading');
  startProgress();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 8192,
        system: `あなたは日本の伝統的な怪談師です。江戸・明治時代の雰囲気をもつ昔話調の怪談話を創作します。

【絶対に守るルール】
- 文体は昔話調（「むかし、むかし」「〜でございます」「〜という話でございます」など）
- 本文は800〜1000文字程度（厳守）
- 必ず起承転結を含め、結末まで完全に書ききること
- 登場人物には古風な和名をつける（例：源兵衛、おきく、佐吉）
- 後味の悪い結末、怪異の正体は曖昧に

【出力形式（必ず以下の形式を守ること）】

タイトル：〇〇〇〇
よみ：（タイトルのひらがな読み）

（本文を漢字まじりで書く。段落は空行で区切る。800〜1000文字）

よみがな：
（本文と同じ内容を、全て平仮名・片仮名のみで書き直す。漢字を一切使わない。段落は同じ区切りで書く）

【よみがなの例】
漢字文：昔、ある山里に老人が住んでいた。
よみがな：むかし、あるやまざとにろうじんがすんでいた。

漢字文：古井戸の底から声が聞こえた。
よみがな：ふるいどのそこからこえがきこえた。`,
        messages: [{
          role: 'user',
          content: `キーワード：${keyword}\n\n800〜1000文字で、必ず結末まで書ききった完結した怪談を、指定の形式で書いてください。`,
        }],
      }),
    });

    const data = await res.json();
    const raw  = data?.content?.[0]?.text;
    if (!raw) throw new Error(data?.error?.message || 'レスポンスが空 (status ' + res.status + ')');

    const parsed = parseStory(raw);

    // 読み上げ用が生成されていない場合のフォールバック
    if (parsed.speechParas.length === 0) {
      throw new Error('よみがなの生成に失敗しました。もう一度お試しください。');
    }

    savedTitleDisplay = parsed.titleDisplay;
    savedDisplayParas = parsed.displayParas;
    savedSpeechParas  = parsed.speechParas;
    savedDisplayFull  = parsed.displayParas.join('\n\n');

    subtitleCues     = buildSubtitleCues(parsed.displayParas, parsed.speechParas);
    speechFull       = parsed.speechParas.join('\n');
    speechTotalChars = speechFull.length;

    stopProgress();
    setTimeout(() => {
      document.getElementById('story-title').textContent = savedTitleDisplay;
      document.getElementById('story-meta').textContent  =
        `キーワード：${keyword}　│　約${savedDisplayFull.length}文字`;
      document.getElementById('story-body').textContent  = savedDisplayFull;
      document.getElementById('gen-btn').disabled = false;
      showScreen('screen-story');
    }, 700);

  } catch (err) {
    stopProgress();
    setTimeout(() => {
      document.getElementById('gen-btn').disabled = false;
      showScreen('screen-input');
      const eb = document.getElementById('err-box');
      eb.textContent   = '⚠ エラー：' + err.message;
      eb.style.display = 'block';
    }, 400);
  }
}

/* ══════════════════════════════════════════════
   音声エンジン
   【モード切替】
   ・OpenAI キーあり → OpenAI TTS API（高品質・人間に近い）
     - 字幕：audio.currentTime + 実際の duration で精密同期
   ・OpenAI キーなし → Web Speech API（デバイス標準）
     - 字幕：boundary イベントの charIndex で同期
   ・一時停止/再開：両モード共通
     - pausedAtSec（秒）を記録 → 再開時にその位置から
══════════════════════════════════════════════ */

let isPlaying    = false;
let isPaused     = false;
let pausedAtSec  = 0;   // 一時停止した再生位置（秒）
let rafId        = null;
let selectedVoice = null;
let audioEl       = null; // OpenAI モード用 Audio 要素
let cueTimes      = [];   // OpenAI モード用：各 cue の再生開始秒

// ── 共通：cue 逆引きテーブル（charIndex 用）──
let cueThresholds = [];
function buildCueThresholds() {
  cueThresholds = subtitleCues.map((c, i) => ({ threshold: c.speechCharOffset, idx: i }));
}
function getCueIdxByCharIndex(ci) {
  let r = 0;
  for (let i = 0; i < cueThresholds.length; i++) {
    if (cueThresholds[i].threshold <= ci) r = cueThresholds[i].idx;
    else break;
  }
  return r;
}

// ── Web Speech API 用 ──
function pickVoice() {
  const voices = window.speechSynthesis.getVoices();
  const jp = voices.filter(v => v.lang && v.lang.startsWith('ja'));
  if (!jp.length) return null;
  return jp.find(v => /男|otoya|ichiro|male/i.test(v.name))
      || jp.find(v => v.default)
      || jp[0];
}

function startPlayer() {
  if (!speechFull) { alert('先に怪談を生成してください'); return; }
  stopAll();
  isPaused = false; pausedAtSec = 0;
  buildCueThresholds();
  document.getElementById('player-title').textContent = savedTitleDisplay;
  updatePlayBtn();
  updateSeqUI(0, 0);
  showScreen('screen-player');

  const openaiKey = document.getElementById('openai-key').value.trim();
  if (openaiKey) {
    playWithOpenAI(openaiKey, 0);
  } else {
    selectedVoice = pickVoice();
    playWithWebSpeech(0);
  }
}

/* ════════════════════════
   ── OpenAI TTS モード ──
════════════════════════ */
async function playWithOpenAI(apiKey, fromSec) {
  isPlaying = true;
  showSubtitle('音声を生成中…');

  try {
    const res = await fetch('https://api.openai.com/v1/audio/speech', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey,
      },
      body: JSON.stringify({
        model: 'tts-1-hd',
        voice: 'onyx',       // 低く落ち着いた男性の声（怪談に最適）
        input: speechFull,
        speed: 0.9,          // 少しゆっくりめで聞き取りやすく
      }),
    });

    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error('OpenAI TTS エラー: ' + (e.error?.message || res.status));
    }

    const blob    = await res.blob();
    const url     = URL.createObjectURL(blob);
    audioEl       = new Audio(url);
    audioEl.currentTime = fromSec;

    // audio 読み込み後に cueTimes を計算
    await new Promise((resolve, reject) => {
      audioEl.onloadedmetadata = resolve;
      audioEl.onerror          = reject;
    });

    const dur = audioEl.duration; // 実際の音声の長さ（秒）
    // 各 cue の再生開始秒 = (speechCharOffset / speechTotalChars) * dur
    cueTimes = subtitleCues.map(c => (c.speechCharOffset / speechTotalChars) * dur);

    // 初期字幕
    const initIdx = getCueIdxByTime(fromSec);
    showSubtitle(subtitleCues[initIdx]?.displayText || '');
    let lastIdx = initIdx;

    audioEl.onended = () => {
      if (!isPlaying) return;
      isPlaying = false; isPaused = false;
      cancelAnimationFrame(rafId);
      URL.revokeObjectURL(url);
      showSubtitle('─ 語り終わりました ─');
      updateSeqUI(100, fmtTime(dur, dur));
      setTimeout(() => { showScreen('screen-story'); }, 3800);
    };

    audioEl.onerror = () => {
      console.warn('[OpenAI Audio] 再生エラー');
    };

    audioEl.play();

    // RAF で字幕・バーを更新
    function tick() {
      if (!isPlaying || isPaused || !audioEl) return;
      const cur = audioEl.currentTime;
      updateSeqUI((cur / dur) * 100, fmtTime(cur, dur));

      // 字幕を進める
      const idx = getCueIdxByTime(cur);
      if (idx !== lastIdx) {
        lastIdx = idx;
        showSubtitle(subtitleCues[idx].displayText);
      }
      rafId = requestAnimationFrame(tick);
    }
    rafId = requestAnimationFrame(tick);

  } catch (err) {
    isPlaying = false;
    // OpenAI が失敗したら Web Speech にフォールバック
    console.warn('[OpenAI TTS]', err.message, '→ Web Speech にフォールバック');
    showSubtitle('');
    selectedVoice = pickVoice();
    playWithWebSpeech(fromSec);
  }
}

function getCueIdxByTime(sec) {
  let r = 0;
  for (let i = 0; i < cueTimes.length; i++) {
    if (cueTimes[i] <= sec) r = i;
    else break;
  }
  return r;
}

/* ══════════════════════════
   ── Web Speech API モード ──
══════════════════════════ */
function playWithWebSpeech(fromCharApprox) {
  isPlaying = true;
  const MS_PER_CHAR = 120;
  const totalEstMs  = speechTotalChars * MS_PER_CHAR;
  const startWall   = Date.now() - fromCharApprox * MS_PER_CHAR;

  const initIdx = getCueIdxByCharIndex(fromCharApprox);
  showSubtitle(subtitleCues[initIdx]?.displayText || '');
  let lastIdx = initIdx;

  const utt = new SpeechSynthesisUtterance(speechFull);
  utt.lang = 'ja-JP'; utt.rate = 0.80; utt.pitch = 0.88; utt.volume = 1.0;
  if (selectedVoice) utt.voice = selectedVoice;

  utt.onboundary = (e) => {
    if (!isPlaying || isPaused) return;
    const idx = getCueIdxByCharIndex(e.charIndex || 0);
    if (idx !== lastIdx) { lastIdx = idx; showSubtitle(subtitleCues[idx].displayText); }
  };

  utt.onend = () => {
    if (!isPlaying) return;
    isPlaying = false; isPaused = false;
    cancelAnimationFrame(rafId);
    showSubtitle('─ 語り終わりました ─');
    updateSeqUI(100, fmtTime(totalEstMs / 1000, totalEstMs / 1000));
    setTimeout(() => { showScreen('screen-story'); }, 3800);
  };

  utt.onerror = (e) => {
    if (e.error === 'interrupted' || e.error === 'canceled') return;
    console.warn('[WebSpeech]', e.error);
  };

  window.speechSynthesis.speak(utt);

  function tick() {
    if (!isPlaying || isPaused) return;
    const elapsed = Date.now() - startWall;
    updateSeqUI(Math.min(100, (elapsed / totalEstMs) * 100), fmtTime(elapsed / 1000, totalEstMs / 1000));
    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

function showSubtitle(text) {
  const el = document.getElementById('subtitle-text');
  el.classList.add('fade');
  setTimeout(() => { el.textContent = text || '　'; el.classList.remove('fade'); }, 200);
}

function updateSeqUI(pct, timeLabel) {
  const p = Math.round(Math.min(100, Math.max(0, typeof pct === 'number' ? pct : 0)));
  document.getElementById('seq-fill').style.width  = p + '%';
  document.getElementById('seq-handle').style.left = p + '%';
  document.getElementById('seq-label').textContent = p + '%';
  if (timeLabel !== undefined) document.getElementById('time-label').textContent = timeLabel;
}

function fmtTime(curSec, totSec) {
  const f = n => `${Math.floor(n/60)}:${String(Math.floor(n%60)).padStart(2,'0')}`;
  return `${f(Math.min(curSec, totSec))} / ${f(totSec)}`;
}

function updatePlayBtn() {
  document.getElementById('btn-play').textContent = isPaused ? '▶' : '⏸';
}

function togglePause() {
  const openaiKey = document.getElementById('openai-key').value.trim();

  if (isPaused) {
    // ── 再開 ──
    isPaused = false;
    updatePlayBtn();
    if (openaiKey && audioEl) {
      // OpenAI モード：Audio 要素を pausedAtSec から再生再開
      isPlaying = true;
      audioEl.currentTime = pausedAtSec;
      audioEl.play();
      const dur = audioEl.duration;
      let lastIdx = getCueIdxByTime(pausedAtSec);
      function tickResume() {
        if (!isPlaying || isPaused || !audioEl) return;
        const cur = audioEl.currentTime;
        updateSeqUI((cur / dur) * 100, fmtTime(cur, dur));
        const idx = getCueIdxByTime(cur);
        if (idx !== lastIdx) { lastIdx = idx; showSubtitle(subtitleCues[idx].displayText); }
        rafId = requestAnimationFrame(tickResume);
      }
      rafId = requestAnimationFrame(tickResume);
    } else {
      // Web Speech モード：最初から speak し直し
      window.speechSynthesis.cancel();
      selectedVoice = pickVoice();
      playWithWebSpeech(0);
    }
  } else {
    // ── 一時停止 ──
    isPaused = true;
    updatePlayBtn();
    cancelAnimationFrame(rafId);
    if (openaiKey && audioEl) {
      pausedAtSec = audioEl.currentTime;
      audioEl.pause();
      isPlaying = true; // 再開可能にする
    } else {
      pausedAtSec = 0; // Web Speech は位置保持困難なので先頭から
      window.speechSynthesis.cancel();
      isPlaying = true;
    }
  }
}

function stopAll() {
  isPlaying = false;
  isPaused  = false;
  cancelAnimationFrame(rafId);
  window.speechSynthesis.cancel();
  if (audioEl) {
    audioEl.pause();
    audioEl.src = '';
    audioEl = null;
  }
}

function stopPlayer() {
  stopAll();
  pausedAtSec = 0;
  showScreen('screen-story');
}

function copyStory() {
  const text = savedTitleDisplay + '\n\n' + savedDisplayFull;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => alert('コピーしました！')).catch(() => fbCopy(text));
  } else { fbCopy(text); }
}
function fbCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;';
  document.body.appendChild(ta); ta.focus(); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
  alert('コピーしました！');
}

/* ══ 初期化 ══ */
function initVoices() {
  const v = window.speechSynthesis.getVoices();
  if (v.length) selectedVoice = pickVoice();
}
window.speechSynthesis.onvoiceschanged = () => { initVoices(); };
initVoices();

document.addEventListener('visibilitychange', () => {
  if (!document.hidden || !isPlaying || isPaused) return;
  // バックグラウンド遷移時に一時停止
  isPaused = true;
  updatePlayBtn();
  cancelAnimationFrame(rafId);
  const openaiKey = document.getElementById('openai-key').value.trim();
  if (openaiKey && audioEl) {
    pausedAtSec = audioEl.currentTime;
    audioEl.pause();
    isPlaying = true;
  } else {
    pausedAtSec = 0;
    window.speechSynthesis.cancel();
    isPlaying = true;
  }
});

window.addEventListener('pagehide',     () => { stopAll(); });
window.addEventListener('beforeunload', () => { stopAll(); });
</script>
